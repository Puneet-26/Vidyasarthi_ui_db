name: vidyasarathi
description: VIDYASARATHI - Academic Management Simplified
version: 2.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  supabase_flutter: ^2.5.0
  riverpod: ^2.0.0
  flutter_riverpod: ^2.0.0
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.5
  uuid: ^4.5.1
  intl: ^0.19.0
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
